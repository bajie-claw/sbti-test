<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI 人格测试</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 首页 -->
    <div id="intro" class="intro-screen active">
        <div class="intro-content">
            <div class="badge">✨ MBTI已经过时，SBTI来了</div>
            <h1 class="hero-title">SBTI 人格测试</h1>
            <p class="hero-sub">基于更科学的性格分析理论，探索你内心最真实的人格特质</p>
            <button class="start-btn" id="startBtn">开始测试</button>
        </div>
    </div>

    <!-- 测试页 -->
    <div id="test" class="test-screen">
        <div class="test-header">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="progress-text"><span id="progressText">0 / 31</span></div>
            </div>
        </div>
        
        <div class="question-list" id="questionList"></div>

        <div class="test-footer">
            <div class="test-hint" id="testHint">点完所有选项才会放行哦～</div>
            <div class="nav-buttons">
                <button class="nav-btn secondary" id="backIntroBtn">返回首页</button>
                <button class="nav-btn primary" id="submitBtn" disabled>提交并查看结果</button>
            </div>
        </div>
    </div>

    <!-- 结果页 -->
    <div id="result" class="result-screen">
        <div class="result-content">
            <div class="card">
                <p class="result-kicker" id="resultModeKicker">你的主类型</p>
                <h1 class="result-type" id="resultTypeName">INTJ</h1>
                <p class="result-badge" id="matchBadge">匹配度 85% · 精准命中 12/15 维</p>
                <p class="result-intro" id="posterCaption">我是谁</p>
                
                <div class="poster-box" id="posterBox">
                    <img id="posterImage" src="" alt="">
                </div>
                
                <p class="result-desc" id="resultDesc">人格描述...</p>
            </div>

            <div class="dim-section">
                <h3 class="dim-section-title">🔍 十五维度解析</h3>
                <div class="dim-grid" id="dimList"></div>
            </div>

            <p class="fun-note" id="funNote">本测试仅供娱乐...</p>

            <div class="result-actions">
                <button class="restart-btn" id="restartBtn">重新测试</button>
            </div>
        </div>
    </div>

    <script src="calc.js"></script>
    <script src="app.js"></script>
</body>
</html>
